<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DQ Studio - Obra</title>
<link rel="manifest" href="manifest.json" />
<style>
:root{--azul:#0b5685;--borde:#d9e1e8;--fondo:#f4f7fa;--txt:#1f2933;--muted:#66788a;--ok:#1f8a4c;--warn:#b7791f;--bad:#c53030}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--fondo);color:var(--txt)}
header{background:var(--azul);color:white;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5} header img{width:54px;height:54px;object-fit:cover;border-radius:6px} header h1{font-size:20px;margin:0} header p{margin:2px 0 0;font-size:13px;opacity:.9}
nav{display:flex;gap:8px;overflow:auto;padding:10px;background:white;border-bottom:1px solid var(--borde);position:sticky;top:82px;z-index:4} nav button{border:1px solid var(--borde);background:white;border-radius:8px;padding:10px 12px;white-space:nowrap;font-weight:600} nav button.active{background:var(--azul);color:white;border-color:var(--azul)}
main{padding:14px;max-width:1100px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.card{background:white;border:1px solid var(--borde);border-radius:12px;padding:14px;margin-bottom:12px}.metric{font-size:26px;font-weight:700}.muted{color:var(--muted);font-size:13px}.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
label{display:block;font-size:13px;font-weight:700;margin:8px 0 4px} input,select,textarea{width:100%;padding:10px;border:1px solid var(--borde);border-radius:8px;font-size:16px;background:white} textarea{min-height:80px} .btn{background:var(--azul);color:white;border:0;border-radius:8px;padding:10px 12px;font-weight:700;margin:8px 6px 0 0}.btn.secondary{background:#475569}.btn.danger{background:var(--bad)}
table{width:100%;border-collapse:collapse;background:white} th,td{border-bottom:1px solid var(--borde);padding:8px;text-align:left;font-size:14px} th{background:#eef4f8}.badge{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:700}.ok{background:#e6f4ea;color:var(--ok)}.warn{background:#fff7e6;color:var(--warn)}.bad{background:#fde8e8;color:var(--bad)}
.check{display:flex;align-items:center;gap:8px;border:1px solid var(--borde);border-radius:8px;padding:9px;margin:6px 0;background:white}.check input{width:auto}.print-only{display:none}
@media print{header,nav,.no-print,.btn{display:none!important} body{background:white}.card{border:0}.print-only{display:block} main{max-width:none}.screen-only{display:none!important}}
</style>
</head>
<body>
<header><img src="assets/logo-dq.jpg" alt="DQ"><div><h1>DQ STUDIO</h1><p>Clientes · Obras · Ejecución · Seguridad y Salud · Cobros</p></div></header>
<nav id="tabs"></nav>
<main id="app"></main>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
const S={clientes:[],obras:[],ejecucion:[],sys:[],actas:[],cobros:[]};
function load(){Object.keys(S).forEach(k=>{S[k]=JSON.parse(localStorage.getItem('dq_'+k)||'[]')}); if(!S.obras.length){seed()}}
function save(k){localStorage.setItem('dq_'+k,JSON.stringify(S[k]))}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function seed(){S.clientes=[{id:id(),nombre:'Duque y Ropero Asociados, S.L.',nif:'',telefono:'',email:'',contacto:'',direccion:'C/ Miguel Bueno Lara 2, Malaga'}];S.obras=[{id:id(),codigo:'MBL2',nombre:'Edificio de 9 Viviendas - LOM 2024/5667',cliente:'Duque y Ropero Asociados, S.L.',direccion:'C/ Miguel Bueno Lara 2, Malaga',estado:'Losa de cimentacion',constructor:'Pago Garzon Construcciones, S.L.',tecnico:'Manuel Miguel Duque Bolivar'}];save('clientes');save('obras')}
const tabs=['Dashboard','Clientes','Obras','Ejecucion','Seguridad y Salud','Actas','Cobros','Exportar'];let tab='Dashboard';
function renderTabs(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="${t==tab?'active':''}" data-tab="${t}">${t}</button>`).join('');document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()})}
function obraOptions(){return S.obras.map(o=>`<option value="${o.codigo}">${o.codigo} - ${o.nombre}</option>`).join('')}
function clientOptions(){return S.clientes.map(c=>`<option>${c.nombre}</option>`).join('')}
function render(){renderTabs(); const a=document.getElementById('app');
if(tab==='Dashboard'){let pend=S.cobros.filter(c=>c.estado!=='Cobrado').reduce((s,c)=>s+Number(c.importe||0),0);a.innerHTML=`<div class="grid"><div class="card"><div class="muted">Clientes</div><div class="metric">${S.clientes.length}</div></div><div class="card"><div class="muted">Obras</div><div class="metric">${S.obras.length}</div></div><div class="card"><div class="muted">Incidencias ejecucion abiertas</div><div class="metric">${S.ejecucion.filter(x=>x.estado!=='Cerrada').length}</div></div><div class="card"><div class="muted">Pendiente de cobro</div><div class="metric">${pend.toLocaleString('es-ES')} €</div></div></div><div class="card"><h2>Flujo recomendado</h2><p>1) Crear cliente. 2) Crear obra/expediente. 3) Registrar controles de ejecucion y SyS. 4) Generar actas. 5) Registrar facturas y cobros.</p></div>`}
if(tab==='Clientes'){a.innerHTML=`<div class="card"><h2>Nuevo cliente</h2><div class="row"><div><label>Nombre / razon social</label><input id="c_nombre"></div><div><label>NIF/CIF</label><input id="c_nif"></div><div><label>Telefono</label><input id="c_tel"></div><div><label>Email</label><input id="c_email"></div><div><label>Contacto</label><input id="c_contacto"></div><div><label>Direccion</label><input id="c_dir"></div></div><button class="btn" id="addCliente">Guardar cliente</button></div>${tableClientes()}`;document.getElementById('addCliente').onclick=()=>{S.clientes.push({id:id(),nombre:v('c_nombre'),nif:v('c_nif'),telefono:v('c_tel'),email:v('c_email'),contacto:v('c_contacto'),direccion:v('c_dir')});save('clientes');render()}}
if(tab==='Obras'){a.innerHTML=`<div class="card"><h2>Nueva obra / expediente</h2><div class="row"><div><label>Codigo</label><input id="o_codigo" placeholder="MBL2"></div><div><label>Nombre</label><input id="o_nombre"></div><div><label>Cliente</label><select id="o_cliente">${clientOptions()}</select></div><div><label>Direccion</label><input id="o_dir"></div><div><label>Estado</label><input id="o_estado"></div><div><label>Constructor</label><input id="o_cons"></div><div><label>Tecnico</label><input id="o_tec"></div></div><button class="btn" id="addObra">Guardar obra</button></div>${tableObras()}`;document.getElementById('addObra').onclick=()=>{S.obras.push({id:id(),codigo:v('o_codigo'),nombre:v('o_nombre'),cliente:v('o_cliente'),direccion:v('o_dir'),estado:v('o_estado'),constructor:v('o_cons'),tecnico:v('o_tec')});save('obras');render()}}
if(tab==='Ejecucion'){a.innerHTML=`<div class="card"><h2>Control de ejecucion</h2><div class="row"><div><label>Obra</label><select id="e_obra">${obraOptions()}</select></div><div><label>Fecha</label><input type="date" id="e_fecha"></div><div><label>Unidad</label><select id="e_unidad"><option>Losa de cimentacion</option><option>Estructura</option><option>Albanileria</option><option>Fachada</option><option>Cubierta</option><option>Instalaciones</option><option>Acabados</option></select></div><div><label>Estado</label><select id="e_estado"><option>Correcto</option><option>Pendiente</option><option>No conformidad</option><option>Cerrada</option></select></div></div><label>Checklist</label><div id="checksE"></div><label>Observaciones / orden</label><textarea id="e_obs"></textarea><button class="btn" id="addEjec">Guardar control</button></div>${tableEjec()}`;checks('checksE',['Replanteo comprobado','Cotas comprobadas','Material conforme','Ejecucion conforme a proyecto','Fotografias realizadas','Ensayo/documentacion pendiente revisada']);document.getElementById('addEjec').onclick=()=>{S.ejecucion.push({id:id(),obra:v('e_obra'),fecha:v('e_fecha'),unidad:v('e_unidad'),estado:v('e_estado'),checks:getChecks('checksE'),obs:v('e_obs')});save('ejecucion');render()}}
if(tab==='Seguridad y Salud'){a.innerHTML=`<div class="card"><h2>Visita Seguridad y Salud</h2><div class="row"><div><label>Obra</label><select id="s_obra">${obraOptions()}</select></div><div><label>Fecha</label><input type="date" id="s_fecha"></div><div><label>Resultado</label><select id="s_estado"><option>Correcto</option><option>Con observaciones</option><option>Requerimiento</option><option>Riesgo grave</option><option>Cerrada</option></select></div></div><label>Checklist SyS</label><div id="checksS"></div><label>Observaciones / requerimiento</label><textarea id="s_obs"></textarea><button class="btn" id="addSys">Guardar SyS</button></div>${tableSys()}`;checks('checksS',['EPIs utilizados','Protecciones perimetrales','Huecos protegidos','Accesos seguros','Orden y limpieza','Cuadro electrico protegido','Senalizacion','Recurso preventivo presente si procede','Maquinaria autorizada','Plan de emergencia visible']);document.getElementById('addSys').onclick=()=>{S.sys.push({id:id(),obra:v('s_obra'),fecha:v('s_fecha'),estado:v('s_estado'),checks:getChecks('checksS'),obs:v('s_obs')});save('sys');render()}}
if(tab==='Actas'){a.innerHTML=`<div class="card no-print"><h2>Generar acta</h2><div class="row"><div><label>Tipo</label><select id="a_tipo"><option>Acta visita Direccion Facultativa</option><option>Acta Coordinador Seguridad y Salud</option><option>Acta autorizacion hormigonado</option><option>Orden de obra</option><option>No conformidad</option></select></div><div><label>Obra</label><select id="a_obra">${obraOptions()}</select></div><div><label>Fecha</label><input type="date" id="a_fecha"></div></div><label>Contenido</label><textarea id="a_texto"></textarea><button class="btn" id="previewActa">Vista previa</button><button class="btn secondary" onclick="window.print()">Imprimir / Guardar PDF</button></div><div id="actaPreview" class="card"></div>`;document.getElementById('previewActa').onclick=()=>previewActa()}
if(tab==='Cobros'){a.innerHTML=`<div class="card"><h2>Gestion de cobros</h2><div class="row"><div><label>Obra</label><select id="co_obra">${obraOptions()}</select></div><div><label>Cliente</label><select id="co_cliente">${clientOptions()}</select></div><div><label>Concepto</label><input id="co_concepto"></div><div><label>Importe</label><input type="number" id="co_importe"></div><div><label>IVA %</label><input type="number" id="co_iva" value="21"></div><div><label>Estado</label><select id="co_estado"><option>Pendiente de facturar</option><option>Facturado pendiente de cobro</option><option>Cobrado</option><option>No facturable</option></select></div><div><label>Fecha</label><input type="date" id="co_fecha"></div></div><button class="btn" id="addCobro">Guardar</button></div>${tableCobros()}${resumenFiscal()}`;document.getElementById('addCobro').onclick=()=>{S.cobros.push({id:id(),obra:v('co_obra'),cliente:v('co_cliente'),concepto:v('co_concepto'),importe:v('co_importe'),iva:v('co_iva'),estado:v('co_estado'),fecha:v('co_fecha')});save('cobros');render()}}
if(tab==='Exportar'){a.innerHTML=`<div class="card"><h2>Exportar / copia de seguridad</h2><p>Descarga los datos para guardarlos antes de cambiar de dispositivo.</p><button class="btn" id="down">Descargar JSON</button><label>Importar JSON</label><textarea id="imp"></textarea><button class="btn secondary" id="import">Importar</button><button class="btn danger" id="wipe">Borrar datos locales</button></div>`;document.getElementById('down').onclick=download;document.getElementById('import').onclick=importData;document.getElementById('wipe').onclick=()=>{if(confirm('Borrar todos los datos locales?')){Object.keys(S).forEach(k=>localStorage.removeItem('dq_'+k));load();render()}}}
}
function v(id){return document.getElementById(id).value.trim()} function checks(el,arr){document.getElementById(el).innerHTML=arr.map((x,i)=>`<label class="check"><input type="checkbox" data-check="${x}" checked> ${x}</label>`).join('')} function getChecks(el){return [...document.querySelectorAll('#'+el+' input')].filter(i=>i.checked).map(i=>i.dataset.check)}
function tableClientes(){return `<div class="card"><h2>Clientes</h2><table><tr><th>Nombre</th><th>Telefono</th><th>Email</th><th>Contacto</th></tr>${S.clientes.map(c=>`<tr><td>${c.nombre}</td><td><a href="tel:${c.telefono}">${c.telefono||''}</a></td><td><a href="mailto:${c.email}">${c.email||''}</a></td><td>${c.contacto||''}</td></tr>`).join('')}</table></div>`}
function tableObras(){return `<div class="card"><h2>Obras</h2><table><tr><th>Codigo</th><th>Nombre</th><th>Cliente</th><th>Estado</th></tr>${S.obras.map(o=>`<tr><td>${o.codigo}</td><td>${o.nombre}</td><td>${o.cliente}</td><td>${o.estado}</td></tr>`).join('')}</table></div>`}
function badge(x){let cls=x.includes('Correcto')||x.includes('Cobrado')?'ok':(x.includes('No')||x.includes('grave')||x.includes('Requerimiento')?'bad':'warn');return `<span class="badge ${cls}">${x}</span>`}
function tableEjec(){return `<div class="card"><h2>Registros ejecucion</h2><table><tr><th>Fecha</th><th>Obra</th><th>Unidad</th><th>Estado</th><th>Obs.</th></tr>${S.ejecucion.map(x=>`<tr><td>${x.fecha}</td><td>${x.obra}</td><td>${x.unidad}</td><td>${badge(x.estado)}</td><td>${x.obs}</td></tr>`).join('')}</table></div>`}
function tableSys(){return `<div class="card"><h2>Registros SyS</h2><table><tr><th>Fecha</th><th>Obra</th><th>Resultado</th><th>Obs.</th></tr>${S.sys.map(x=>`<tr><td>${x.fecha}</td><td>${x.obra}</td><td>${badge(x.estado)}</td><td>${x.obs}</td></tr>`).join('')}</table></div>`}
function tableCobros(){return `<div class="card"><h2>Cobros / facturacion</h2><table><tr><th>Fecha</th><th>Cliente</th><th>Concepto</th><th>Importe</th><th>Estado</th></tr>${S.cobros.map(x=>`<tr><td>${x.fecha}</td><td>${x.cliente}</td><td>${x.concepto}</td><td>${Number(x.importe||0).toLocaleString('es-ES')} €</td><td>${badge(x.estado)}</td></tr>`).join('')}</table></div>`}
function resumenFiscal(){let fact=S.cobros.filter(x=>x.estado.includes('Facturado')||x.estado==='Cobrado');let base=fact.reduce((s,x)=>s+Number(x.importe||0),0);let iva=fact.reduce((s,x)=>s+Number(x.importe||0)*Number(x.iva||0)/100,0);let pend=S.cobros.filter(x=>x.estado!=='Cobrado'&&x.estado!=='No facturable').reduce((s,x)=>s+Number(x.importe||0),0);return `<div class="card"><h2>Resumen fiscal orientativo</h2><div class="grid"><div><div class="muted">Base facturada/cobrada</div><div class="metric">${base.toLocaleString('es-ES')} €</div></div><div><div class="muted">IVA repercutido estimado</div><div class="metric">${iva.toLocaleString('es-ES')} €</div></div><div><div class="muted">Pendiente facturar/cobrar</div><div class="metric">${pend.toLocaleString('es-ES')} €</div></div></div><p class="muted">Resumen orientativo. No sustituye la revision fiscal.</p></div>`}
function previewActa(){let obra=S.obras.find(o=>o.codigo===v('a_obra'))||{};let tipo=v('a_tipo');let fecha=v('a_fecha');let texto=v('a_texto');document.getElementById('actaPreview').innerHTML=`<div class="print-only"><h1>${tipo}</h1></div><h2>${tipo}</h2><p><b>Obra:</b> ${obra.codigo||''} - ${obra.nombre||''}</p><p><b>Direccion:</b> ${obra.direccion||''}</p><p><b>Fecha:</b> ${fecha}</p><p><b>Promotor/cliente:</b> ${obra.cliente||''}</p><p><b>Constructor:</b> ${obra.constructor||''}</p><p><b>Direccion facultativa:</b> ${obra.tecnico||''}</p><hr><p style="white-space:pre-wrap">${texto}</p><br><br><p>Firma Direccion Facultativa / Coordinador:</p><br><br><p>_____________________________</p>`}
function download(){let data=JSON.stringify(S,null,2);let blob=new Blob([data],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='dq-studio-datos.json';a.click();URL.revokeObjectURL(url)}
function importData(){try{let d=JSON.parse(v('imp'));Object.keys(S).forEach(k=>{if(Array.isArray(d[k])){S[k]=d[k];save(k)}});render()}catch(e){alert('JSON no valido')}}
load();render();
</script>
</body>
</html>
