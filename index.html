<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DQ Studio - Obra v4</title>
<link rel="manifest" href="manifest.json" />
<style>
:root{--azul:#0b5685;--azul2:#063b5c;--borde:#d9e1e8;--fondo:#f4f7fa;--txt:#1f2933;--muted:#66788a;--ok:#1f8a4c;--warn:#b7791f;--bad:#c53030;--card:#fff}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--fondo);color:var(--txt)}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:white;padding:12px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5} header img{width:52px;height:52px;object-fit:cover;border-radius:8px;background:white} header h1{font-size:20px;margin:0} header p{margin:2px 0 0;font-size:13px;opacity:.9}
nav{display:flex;gap:8px;overflow:auto;padding:10px;background:white;border-bottom:1px solid var(--borde);position:sticky;top:76px;z-index:4} nav button{border:1px solid var(--borde);background:white;border-radius:10px;padding:10px 12px;white-space:nowrap;font-weight:700} nav button.active{background:var(--azul);color:white;border-color:var(--azul)}
main{padding:14px;max-width:1180px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(235px,1fr));gap:12px}.card{background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:14px;margin-bottom:12px}.metric{font-size:26px;font-weight:800}.muted{color:var(--muted);font-size:13px}.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:760px){.two{grid-template-columns:1fr}}
label{display:block;font-size:13px;font-weight:700;margin:8px 0 4px} input,select,textarea{width:100%;padding:10px;border:1px solid var(--borde);border-radius:9px;font-size:16px;background:white} textarea{min-height:82px}.small{font-size:12px}.btn{background:var(--azul);color:white;border:0;border-radius:9px;padding:10px 12px;font-weight:800;margin:8px 6px 0 0}.btn.secondary{background:#475569}.btn.light{background:#edf3f7;color:#123;border:1px solid var(--borde)}.btn.danger{background:var(--bad)}.btn.whatsapp{background:#16803c}.btn.mail{background:#334155}
table{width:100%;border-collapse:collapse;background:white} th,td{border-bottom:1px solid var(--borde);padding:8px;text-align:left;font-size:14px;vertical-align:top} th{background:#eef4f8}.scroll{overflow:auto}.badge{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:800}.ok{background:#e6f4ea;color:var(--ok)}.warn{background:#fff7e6;color:var(--warn)}.bad{background:#fde8e8;color:var(--bad)}.chip{display:inline-block;border:1px solid var(--borde);border-radius:999px;padding:4px 8px;margin:2px;background:#f8fafc;font-size:12px}
.check{display:flex;align-items:center;gap:8px;border:1px solid var(--borde);border-radius:8px;padding:9px;margin:6px 0;background:white}.check input{width:auto}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.print-only{display:none}.doc{font-family:Arial,Helvetica,sans-serif;line-height:1.35}.doc h1{font-size:22px;text-align:center}.doc h2{font-size:17px;border-bottom:1px solid #999;padding-bottom:4px}.signgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:40px}.sign{height:90px;border-top:1px solid #333;text-align:center;padding-top:8px}.note{background:#f7fbff;border:1px solid #cfe2f3;border-radius:10px;padding:10px}.actions{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none!important}.path{font-family:monospace;background:#eef4f8;border:1px solid var(--borde);border-radius:8px;padding:8px;word-break:break-word}.filebox{border:1px dashed var(--borde);border-radius:10px;padding:10px;background:#fafcff}
@media print{header,nav,.no-print,.btn,.actions{display:none!important} body{background:white}.card{border:0}.print-only{display:block} main{max-width:none}.screen-only{display:none!important}.doc{font-size:12pt}.signgrid{page-break-inside:avoid}}
</style>
</head>
<body>
<header><img src="assets/logo-dq.jpg" alt="DQ"><div><h1>DQ STUDIO</h1><p>Obras · Agentes · Actas · SyS · Documentos · Cobros · Facturas y gastos</p></div></header>
<nav id="tabs"></nav>
<main id="app"></main>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
const S={clientes:[],obras:[],agentes:[],ejecucion:[],sys:[],actas:[],documentos:[],cobros:[],facturasGastos:[]};
const keys=Object.keys(S);let tab='Dashboard';
const tabs=['Dashboard','Clientes','Agentes','Obras','Ejecucion','Seguridad y Salud','Actas y documentos','Documentacion','Cobros','Facturas y gastos','Exportar'];
function load(){keys.forEach(k=>{S[k]=JSON.parse(localStorage.getItem('dq_'+k)||'[]')});migrate();if(!S.clientes.length&&!S.obras.length&&!S.agentes.length)seed();}
function save(k){localStorage.setItem('dq_'+k,JSON.stringify(S[k]))}
function saveAll(){keys.forEach(save)}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(x){return String(x??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function v(id){let e=document.getElementById(id);return e?e.value.trim():''}
function setVal(id,val){let e=document.getElementById(id); if(e)e.value=val||''}
function today(){return new Date().toISOString().slice(0,10)}
function migrate(){
  S.obras.forEach(o=>{if(!o.agentes)o.agentes={}; if(o.constructor&&!o.agentes.constructor)o.agentes.constructor=o.constructor; if(o.tecnico&&!o.agentes.do)o.agentes.do=o.tecnico;});
  if(!Array.isArray(S.agentes))S.agentes=[];
}
function seed(){
 const c={id:id(),nombre:'Duque y Ropero Asociados, S.L.',nif:'B92217025',telefono:'',email:'',contacto:'',direccion:'C/ Raimundo Lulio 12, 29018 Malaga'};S.clientes.push(c);
 const a1={id:id(),tipo:'Promotor',nombre:'Duque y Ropero Asociados, S.L.',nif:'B92217025',contacto:'',telefono:'',email:'',direccion:'C/ Raimundo Lulio 12, 29018 Malaga'};
 const dirTitular='C/ Raimundo Lulio 12, 29018 Malaga';
 const a2={id:id(),tipo:'Arquitecto / Autor proyecto / Director obra / CSS',nombre:'Manuel Miguel Duque Bolivar',nif:'25.054.187-B',contacto:'Arquitecto',telefono:'',email:'',direccion:dirTitular};
 const a2b={id:id(),tipo:'Ingeniero de Edificacion / Arquitecto Tecnico / DEM',nombre:'Manuel Miguel Duque Bolivar',nif:'25.054.187-B',contacto:'Ingeniero de Edificacion',telefono:'',email:'',direccion:dirTitular};
 const a2c={id:id(),tipo:'Ingeniero Mecanico / Instalaciones',nombre:'Manuel Miguel Duque Bolivar',nif:'25.054.187-B',contacto:'Ingenieria de instalaciones',telefono:'',email:'',direccion:dirTitular};
 const a3={id:id(),tipo:'Constructora',nombre:'Pago Garzon Construcciones, S.L.',nif:'B26694489',contacto:'Modesto Jesus Tellez Fernandez - Recurso preventivo',telefono:'',email:'',direccion:'C/ Pilar 8, 29719 Benamocarra, Malaga'};
 S.agentes.push(a1,a2,a2b,a2c,a3);
 S.obras.push({id:id(),codigo:'MBL2',nombre:'Edificio de 9 Viviendas - LOM 2024/5667',cliente:c.nombre,direccion:'C/ Miguel Bueno Lara 2, Malaga',estado:'Fase de losa de cimentacion',expediente:'LOM 2024/5667',pem:'',agentes:{promotor:a1.id,constructor:a3.id,do:a2.id,dem:a2b.id,css:a2.id,recurso:a3.id,autor:a2.id,ingMecanico:a2c.id}});
 saveAll();
}
function renderTabs(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="${t==tab?'active':''}" data-tab="${esc(t)}">${esc(t)}</button>`).join('');document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()})}
function render(){renderTabs(); const a=document.getElementById('app');
 if(tab==='Dashboard')return dashboard(a); if(tab==='Clientes')return clientes(a); if(tab==='Agentes')return agentes(a); if(tab==='Obras')return obras(a); if(tab==='Ejecucion')return ejecucion(a); if(tab==='Seguridad y Salud')return sys(a); if(tab==='Actas y documentos')return actas(a); if(tab==='Documentacion')return documentacion(a); if(tab==='Cobros')return cobros(a); if(tab==='Facturas y gastos')return facturasGastos(a); if(tab==='Exportar')return exp(a);
}
function dashboard(a){let pend=S.cobros.filter(c=>c.estado!=='Cobrado'&&c.estado!=='No facturable').reduce((s,c)=>s+Number(c.importe||0),0);let act=S.actas.filter(x=>x.estado!=='Enviada').length;let gastos=S.facturasGastos.filter(x=>x.clase==='Gasto').reduce((s,x)=>s+Number(x.base||0),0); a.innerHTML=`<div class="grid"><div class="card"><div class="muted">Clientes</div><div class="metric">${S.clientes.length}</div></div><div class="card"><div class="muted">Obras</div><div class="metric">${S.obras.length}</div></div><div class="card"><div class="muted">Actas no enviadas</div><div class="metric">${act}</div></div><div class="card"><div class="muted">Pendiente facturar/cobrar</div><div class="metric">${pend.toLocaleString('es-ES')} €</div></div><div class="card"><div class="muted">Gastos registrados</div><div class="metric">${gastos.toLocaleString('es-ES')} €</div></div></div><div class="card note"><b>Uso en obra:</b> 1) completa agentes y contactos, 2) vincula agentes a la obra, 3) registra visita/control, 4) genera acta, 5) imprime/guarda PDF o usa los enlaces de email/WhatsApp.</div>${tableActas(true)}`}
function clientes(a){a.innerHTML=`<div class="card"><div class="section-title"><h2>Clientes</h2><button class="btn" id="newCli">Nuevo cliente</button></div><div id="cliForm"></div></div>${tableClientes()}`;document.getElementById('newCli').onclick=()=>formCliente()}
function formCliente(c={}){document.getElementById('cliForm').innerHTML=`<div class="row"><div><label>Nombre / razon social</label><input id="c_nombre" value="${esc(c.nombre)}"></div><div><label>NIF/CIF</label><input id="c_nif" value="${esc(c.nif)}"></div><div><label>Telefono</label><input id="c_tel" value="${esc(c.telefono)}"></div><div><label>Email</label><input id="c_email" value="${esc(c.email)}"></div><div><label>Contacto</label><input id="c_contacto" value="${esc(c.contacto)}"></div><div><label>Direccion fiscal</label><input id="c_dir" value="${esc(c.direccion)}"></div></div><button class="btn" id="saveCli">Guardar</button>`;document.getElementById('saveCli').onclick=()=>{let obj={id:c.id||id(),nombre:v('c_nombre'),nif:v('c_nif'),telefono:v('c_tel'),email:v('c_email'),contacto:v('c_contacto'),direccion:v('c_dir')};upsert(S.clientes,obj);save('clientes');render()}}
function agentes(a){a.innerHTML=`<div class="card"><div class="section-title"><h2>Agentes, tecnicos y contactos de obra</h2><div class="actions"><button class="btn light" id="defaultTechs">Cargar mis tecnicos por defecto</button><button class="btn" id="newAg">Nuevo agente</button></div></div><p class="muted">Aqui se introducen constructora, recurso preventivo, autor de proyecto, DO, DEM, CSS, OCT, laboratorio, instaladores, promotor, etc. Luego se vinculan en cada obra. El boton de tecnicos crea o actualiza tus datos por defecto como arquitecto, ingeniero de edificacion/arquitecto tecnico e ingeniero mecanico.</p><div id="agForm"></div></div>${tableAgentes()}`;document.getElementById('newAg').onclick=()=>formAgente();document.getElementById('defaultTechs').onclick=defaultTechs}
function defaultTechs(){const base={nombre:'Manuel Miguel Duque Bolivar',nif:'25.054.187-B',telefono:'',email:'',direccion:'C/ Raimundo Lulio 12, 29018 Malaga'};[
 {tipo:'Arquitecto / Autor proyecto / Director obra / CSS',contacto:'Arquitecto'},
 {tipo:'Ingeniero de Edificacion / Arquitecto Tecnico / DEM',contacto:'Ingeniero de Edificacion / Arquitecto Tecnico'},
 {tipo:'Ingeniero Mecanico / Instalaciones',contacto:'Ingeniero Mecanico'}
].forEach(t=>{let ex=S.agentes.find(a=>a.tipo===t.tipo&&a.nif===base.nif);let obj={...(ex||{id:id()}),...base,...t};upsert(S.agentes,obj)});save('agentes');alert('Tecnicos por defecto cargados/actualizados. Revisa telefono y email si quieres que aparezcan en actas y comunicaciones.');render()}
function formAgente(g={}){document.getElementById('agForm').innerHTML=`<div class="row"><div><label>Tipo / cargo</label><select id="g_tipo"><option>Promotor</option><option>Constructora</option><option>Representante constructora</option><option>Recurso preventivo</option><option>Arquitecto / Autor proyecto / Director obra / CSS</option><option>Ingeniero de Edificacion / Arquitecto Tecnico / DEM</option><option>Ingeniero Mecanico / Instalaciones</option><option>Autor proyecto</option><option>Director obra</option><option>Director ejecucion material</option><option>Coordinador Seguridad y Salud</option><option>Laboratorio control calidad</option><option>OCT</option><option>Instalador</option><option>Industrial</option><option>Otro</option></select></div><div><label>Nombre / razon social</label><input id="g_nombre" value="${esc(g.nombre)}"></div><div><label>NIF/CIF</label><input id="g_nif" value="${esc(g.nif)}"></div><div><label>Persona contacto / titulacion</label><input id="g_contacto" value="${esc(g.contacto)}"></div><div><label>Telefono</label><input id="g_tel" value="${esc(g.telefono)}"></div><div><label>Email</label><input id="g_email" value="${esc(g.email)}"></div><div><label>Direccion</label><input id="g_dir" value="${esc(g.direccion)}"></div></div><button class="btn" id="saveAg">Guardar agente</button>`;setVal('g_tipo',g.tipo||'Otro');document.getElementById('saveAg').onclick=()=>{let obj={id:g.id||id(),tipo:v('g_tipo'),nombre:v('g_nombre'),nif:v('g_nif'),contacto:v('g_contacto'),telefono:v('g_tel'),email:v('g_email'),direccion:v('g_dir')};upsert(S.agentes,obj);save('agentes');render()}}
function obras(a){a.innerHTML=`<div class="card"><div class="section-title"><h2>Obras / expedientes</h2><button class="btn" id="newObra">Nueva obra</button></div><div id="obraForm"></div></div>${tableObras()}`;document.getElementById('newObra').onclick=()=>formObra()}
function formObra(o={}){document.getElementById('obraForm').innerHTML=`<div class="row"><div><label>Codigo</label><input id="o_codigo" value="${esc(o.codigo)}"></div><div><label>Nombre</label><input id="o_nombre" value="${esc(o.nombre)}"></div><div><label>Expediente/licencia</label><input id="o_exp" value="${esc(o.expediente)}"></div><div><label>Cliente</label><select id="o_cliente">${clientOptions(o.cliente)}</select></div><div><label>Direccion obra</label><input id="o_dir" value="${esc(o.direccion)}"></div><div><label>Estado</label><input id="o_estado" value="${esc(o.estado)}"></div><div><label>PEM</label><input id="o_pem" value="${esc(o.pem)}"></div></div><h3>Agentes vinculados a esta obra</h3><div class="row"><div><label>Promotor</label><select id="o_promotor">${agentOptions(o.agentes?.promotor)}</select></div><div><label>Constructora</label><select id="o_constructor">${agentOptions(o.agentes?.constructor)}</select></div><div><label>Representante / recurso preventivo</label><select id="o_recurso">${agentOptions(o.agentes?.recurso)}</select></div><div><label>Autor del proyecto</label><select id="o_autor">${agentOptions(o.agentes?.autor)}</select></div><div><label>Director de obra</label><select id="o_do">${agentOptions(o.agentes?.do)}</select></div><div><label>Director ejecucion material</label><select id="o_dem">${agentOptions(o.agentes?.dem)}</select></div><div><label>Coordinador SyS</label><select id="o_css">${agentOptions(o.agentes?.css)}</select></div><div><label>Laboratorio / OCT</label><select id="o_lab">${agentOptions(o.agentes?.lab)}</select></div></div><button class="btn" id="saveObra">Guardar obra</button>`;document.getElementById('saveObra').onclick=()=>{let obj={id:o.id||id(),codigo:v('o_codigo'),nombre:v('o_nombre'),expediente:v('o_exp'),cliente:v('o_cliente'),direccion:v('o_dir'),estado:v('o_estado'),pem:v('o_pem'),agentes:{promotor:v('o_promotor'),constructor:v('o_constructor'),recurso:v('o_recurso'),autor:v('o_autor'),do:v('o_do'),dem:v('o_dem'),css:v('o_css'),lab:v('o_lab')}};upsert(S.obras,obj);save('obras');render()}}
function ejecucion(a){a.innerHTML=`<div class="card"><h2>Control de ejecucion</h2><div class="row"><div><label>Obra</label><select id="e_obra">${obraOptions()}</select></div><div><label>Fecha</label><input type="date" id="e_fecha" value="${today()}"></div><div><label>Unidad</label><select id="e_unidad"><option>Losa de cimentacion</option><option>Estructura</option><option>Albanileria</option><option>Fachada</option><option>Cubierta</option><option>Instalaciones</option><option>Acabados</option><option>Urbanizacion</option></select></div><div><label>Estado</label><select id="e_estado"><option>Correcto</option><option>Pendiente</option><option>No conformidad</option><option>Cerrada</option></select></div></div><label>Checklist</label><div id="checksE"></div><label>Observaciones / orden</label><textarea id="e_obs"></textarea><button class="btn" id="addEjec">Guardar control</button><button class="btn secondary" id="actaEjec">Generar acta desde control</button></div>${tableEjec()}`;checks('checksE',['Replanteo/cotas comprobados','Material conforme','Ejecucion conforme a proyecto','Recubrimientos/separadores comprobados','Huecos/instalaciones embebidas revisados','Fotografias realizadas','Ensayo/documentacion pendiente revisada']);document.getElementById('addEjec').onclick=()=>saveEjec(false);document.getElementById('actaEjec').onclick=()=>saveEjec(true)}
function saveEjec(go){let obj={id:id(),obra:v('e_obra'),fecha:v('e_fecha'),unidad:v('e_unidad'),estado:v('e_estado'),checks:getChecks('checksE'),obs:v('e_obs')};S.ejecucion.push(obj);save('ejecucion'); if(go){createActaFrom('Acta visita Direccion Facultativa',obj.obra,obj.fecha,`Unidad revisada: ${obj.unidad}\nEstado: ${obj.estado}\nComprobaciones: ${obj.checks.join(', ')}\nObservaciones/ordenes: ${obj.obs}`)} else render()}
function sys(a){a.innerHTML=`<div class="card"><h2>Visita Seguridad y Salud</h2><div class="row"><div><label>Obra</label><select id="s_obra">${obraOptions()}</select></div><div><label>Fecha</label><input type="date" id="s_fecha" value="${today()}"></div><div><label>Resultado</label><select id="s_estado"><option>Correcto</option><option>Con observaciones</option><option>Requerimiento</option><option>Riesgo grave</option><option>Cerrada</option></select></div></div><label>Checklist SyS</label><div id="checksS"></div><label>Observaciones / requerimiento</label><textarea id="s_obs"></textarea><button class="btn" id="addSys">Guardar SyS</button><button class="btn secondary" id="actaSys">Generar acta SyS</button></div>${tableSys()}`;checks('checksS',['EPIs utilizados','Protecciones perimetrales','Huecos protegidos','Accesos seguros','Orden y limpieza','Cuadro electrico protegido','Senalizacion','Recurso preventivo presente si procede','Maquinaria autorizada','Plan de emergencia visible']);document.getElementById('addSys').onclick=()=>saveSys(false);document.getElementById('actaSys').onclick=()=>saveSys(true)}
function saveSys(go){let obj={id:id(),obra:v('s_obra'),fecha:v('s_fecha'),estado:v('s_estado'),checks:getChecks('checksS'),obs:v('s_obs')};S.sys.push(obj);save('sys'); if(go){createActaFrom('Acta Coordinador Seguridad y Salud',obj.obra,obj.fecha,`Resultado de la visita: ${obj.estado}\nComprobaciones: ${obj.checks.join(', ')}\nObservaciones/requerimientos: ${obj.obs}`)} else render()}
function actas(a){a.innerHTML=`<div class="card no-print"><div class="section-title"><h2>Actas y documentos</h2><button class="btn" id="newActa">Nueva acta</button></div><div id="actaForm"></div></div><div id="actaPreview" class="card"></div>${tableActas(false)}`;document.getElementById('newActa').onclick=()=>formActa()}
function formActa(x={}){document.getElementById('actaForm').innerHTML=`<div class="row"><div><label>Tipo</label><select id="a_tipo"><option>Acta visita Direccion Facultativa</option><option>Acta Coordinador Seguridad y Salud</option><option>Acta autorizacion hormigonado</option><option>Acta recepcion armaduras</option><option>Orden de obra</option><option>No conformidad</option><option>Informe fotografico</option></select></div><div><label>Obra</label><select id="a_obra">${obraOptions(x.obra)}</select></div><div><label>Fecha</label><input type="date" id="a_fecha" value="${esc(x.fecha||today())}"></div><div><label>Estado</label><select id="a_estado"><option>Borrador</option><option>Generada</option><option>Enviada</option><option>Firmada</option><option>Archivada</option></select></div></div><label>Asunto para envio</label><input id="a_asunto" value="${esc(x.asunto||'Acta de obra')}"><label>Contenido / acuerdos / ordenes</label><textarea id="a_texto">${esc(x.texto||'')}</textarea><div class="actions"><button class="btn" id="saveActa">Guardar acta</button><button class="btn secondary" id="prevActa">Vista previa</button><button class="btn light" onclick="window.print()">Imprimir / Guardar PDF</button></div>`;setVal('a_tipo',x.tipo||'Acta visita Direccion Facultativa');setVal('a_estado',x.estado||'Borrador');document.getElementById('saveActa').onclick=()=>{let obj={id:x.id||id(),tipo:v('a_tipo'),obra:v('a_obra'),fecha:v('a_fecha'),estado:v('a_estado'),asunto:v('a_asunto'),texto:v('a_texto')};upsert(S.actas,obj);save('actas');previewActa(obj);render()};document.getElementById('prevActa').onclick=()=>previewActa({tipo:v('a_tipo'),obra:v('a_obra'),fecha:v('a_fecha'),estado:v('a_estado'),asunto:v('a_asunto'),texto:v('a_texto')})}
function createActaFrom(tipo,obra,fecha,texto){let obj={id:id(),tipo,obra,fecha,estado:'Generada',asunto:`${tipo} - ${obra} - ${fecha}`,texto};S.actas.push(obj);save('actas');tab='Actas y documentos';render();previewActa(obj)}
function previewActa(act){let obra=S.obras.find(o=>o.codigo===act.obra)||S.obras[0]||{};let ag=obraAgents(obra);let recips=[ag.constructor?.email,ag.promotor?.email,ag.do?.email,ag.dem?.email,ag.css?.email].filter(Boolean);let phones=[ag.constructor?.telefono,ag.recurso?.telefono,ag.promotor?.telefono].filter(Boolean);let body=plainActa(act,obra,ag);let mail=`mailto:${encodeURIComponent(recips.join(','))}?subject=${encodeURIComponent(act.asunto||act.tipo)}&body=${encodeURIComponent(body)}`;let wa=phones[0]?`https://wa.me/${cleanPhone(phones[0])}?text=${encodeURIComponent(body)}`:'';let docInfo=docInfoFromActa(act,obra);let html=`<div class="actions no-print"><a class="btn mail" href="${mail}">Enviar por email</a>${wa?`<a class="btn whatsapp" target="_blank" href="${wa}">Enviar WhatsApp</a>`:''}<button class="btn light" onclick="window.print()">Imprimir / Guardar PDF</button><button class="btn secondary" onclick="downloadActaHtml('${act.id||''}')">Descargar acta HTML</button><button class="btn" onclick="registerActaDocument('${act.id||''}')">Registrar en carpeta documental</button></div><div class="note no-print"><b>Carpeta sugerida:</b><div class="path">${esc(docInfo.path)}</div><span class="muted">Al guardar como PDF, usa este nombre: ${esc(docInfo.filename)}. En iPhone/iPad, desde Imprimir puedes compartir o guardar en Archivos.</span></div><div class="doc"><h1>${esc(act.tipo)}</h1><p><b>Obra:</b> ${esc(obra.codigo)} - ${esc(obra.nombre)}</p><p><b>Expediente:</b> ${esc(obra.expediente||'')}</p><p><b>Emplazamiento:</b> ${esc(obra.direccion||'')}</p><p><b>Fecha:</b> ${esc(act.fecha)}</p><h2>Agentes intervinientes</h2><table><tr><th>Cargo</th><th>Nombre</th><th>NIF/CIF</th><th>Contacto</th></tr>${agentRow('Promotor',ag.promotor)}${agentRow('Constructora',ag.constructor)}${agentRow('Representante / recurso preventivo',ag.recurso)}${agentRow('Autor proyecto',ag.autor)}${agentRow('Director de obra',ag.do)}${agentRow('Director ejecucion material',ag.dem)}${agentRow('Coordinador Seguridad y Salud',ag.css)}${agentRow('Laboratorio/OCT',ag.lab)}</table><h2>Contenido del acta</h2><p style="white-space:pre-wrap">${esc(act.texto)}</p><h2>Archivo documental</h2><p><b>Categoria:</b> ${esc(docInfo.categoria)}</p><p><b>Nombre sugerido:</b> ${esc(docInfo.filename)}</p><p><b>Carpeta:</b> ${esc(docInfo.path)}</p><h2>Comunicaciones</h2><p><b>Destinatarios email:</b> ${esc(recips.join(', ')||'No constan emails')}</p><p><b>Telefonos disponibles:</b> ${esc(phones.join(', ')||'No constan telefonos')}</p><div class="signgrid"><div class="sign">Direccion Facultativa / CSS</div><div class="sign">Constructor / Recibido</div></div></div>`;let p=document.getElementById('actaPreview');if(p)p.innerHTML=html}
function plainActa(act,obra,ag){return `${act.tipo}\nObra: ${obra.codigo||''} - ${obra.nombre||''}\nExpediente: ${obra.expediente||''}\nDireccion: ${obra.direccion||''}\nFecha: ${act.fecha||''}\nPromotor: ${ag.promotor?.nombre||obra.cliente||''}\nConstructora: ${ag.constructor?.nombre||''}\nDireccion facultativa: ${ag.do?.nombre||''}\n\n${act.texto||''}\n\nDQ Studio`}
function agentRow(label,g){return `<tr><td>${esc(label)}</td><td>${esc(g?.nombre||'')}</td><td>${esc(g?.nif||'')}</td><td>${esc([g?.contacto,g?.telefono,g?.email].filter(Boolean).join(' · '))}</td></tr>`}

function docCategoryFromType(t){t=t||''; if(t.includes('Seguridad'))return '02_Seguridad_y_Salud'; if(t.includes('hormigonado')||t.includes('armaduras')||t.includes('recepcion'))return '03_Control_Calidad'; if(t.includes('Orden'))return '04_Ordenes_de_Obra'; if(t.includes('No conformidad'))return '05_No_Conformidades'; if(t.includes('fotografico'))return '06_Fotografias'; return '01_Actas_Ejecucion'}
function safeName(x){return String(x||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_-]+/g,'_').replace(/^_+|_+$/g,'')||'documento'}
function docInfoFromActa(act,obra){let categoria=docCategoryFromType(act.tipo);let code=safeName(obra.codigo||act.obra||'OBRA');let date=safeName(act.fecha||today());let tipo=safeName(act.tipo);let filename=`${date}_${code}_${tipo}.pdf`;let path=`${code}/06_Obra/${categoria}/${filename}`;return {categoria,filename,path}}
function registerActaDocument(actId){let act=S.actas.find(a=>a.id===actId); if(!act){alert('Guarda primero el acta.');return} let obra=S.obras.find(o=>o.codigo===act.obra)||{};let info=docInfoFromActa(act,obra);let obj={id:id(),obra:act.obra,fecha:act.fecha||today(),categoria:info.categoria,titulo:act.tipo,origen:'Acta generada',archivo:info.filename,ruta:info.path,tipo:'Acta',notas:'Registrada desde acta. Guardar el PDF en la carpeta indicada.'};S.documentos.push(obj);save('documentos');act.estado='Archivada';save('actas');alert('Documento registrado en la carpeta documental: '+info.path);render()}
function downloadActaHtml(actId){let act=S.actas.find(a=>a.id===actId); if(!act){alert('Guarda primero el acta.');return} let obra=S.obras.find(o=>o.codigo===act.obra)||{};let ag=obraAgents(obra);let info=docInfoFromActa(act,obra);let html=`<!doctype html><html><head><meta charset="utf-8"><title>${esc(act.tipo)}</title><style>body{font-family:Arial;margin:28px;line-height:1.35}h1{text-align:center;font-size:22px}h2{font-size:17px;border-bottom:1px solid #999}table{width:100%;border-collapse:collapse}td,th{border:1px solid #ccc;padding:6px;text-align:left}.signgrid{display:grid;grid-template-columns:1fr 1fr;gap:25px;margin-top:55px}.sign{border-top:1px solid #333;text-align:center;padding-top:8px}</style></head><body><h1>${esc(act.tipo)}</h1><p><b>Obra:</b> ${esc(obra.codigo)} - ${esc(obra.nombre)}</p><p><b>Expediente:</b> ${esc(obra.expediente||'')}</p><p><b>Emplazamiento:</b> ${esc(obra.direccion||'')}</p><p><b>Fecha:</b> ${esc(act.fecha)}</p><h2>Agentes intervinientes</h2><table><tr><th>Cargo</th><th>Nombre</th><th>NIF/CIF</th><th>Contacto</th></tr>${agentRow('Promotor',ag.promotor)}${agentRow('Constructora',ag.constructor)}${agentRow('Representante / recurso preventivo',ag.recurso)}${agentRow('Autor proyecto',ag.autor)}${agentRow('Director de obra',ag.do)}${agentRow('Director ejecucion material',ag.dem)}${agentRow('Coordinador Seguridad y Salud',ag.css)}${agentRow('Laboratorio/OCT',ag.lab)}</table><h2>Contenido del acta</h2><p style="white-space:pre-wrap">${esc(act.texto)}</p><h2>Archivo</h2><p>${esc(info.path)}</p><div class="signgrid"><div class="sign">Direccion Facultativa / CSS</div><div class="sign">Constructor / Recibido</div></div></body></html>`;let blob=new Blob([html],{type:'text/html'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download=info.filename.replace(/\.pdf$/,'.html');a.click();URL.revokeObjectURL(url)}
function documentacion(a){a.innerHTML=`<div class="card"><div class="section-title"><h2>Documentacion y escaneos</h2><button class="btn" id="newDoc">Nuevo documento</button></div><p class="muted">Registra actas, fichas tecnicas, certificados, ensayos, documentacion de SyS y escaneos. En iPhone puedes usar la camara desde “Escanear/fotografiar documento”.</p><div class="note"><b>Estructura recomendada por obra</b><div class="path">OBRA/01_Cliente · 02_Proyecto · 03_Licencia · 04_Agentes · 05_Seguridad_y_Salud · 06_Obra/01_Actas_Ejecucion · 06_Obra/02_Seguridad_y_Salud · 06_Obra/03_Control_Calidad · 06_Obra/07_Fichas_Tecnicas · 07_Cobros_Facturas · 08_Final_Obra</div></div><div id="docForm"></div></div>${tableDocs()}`;document.getElementById('newDoc').onclick=()=>formDoc()}
function formDoc(d={}){document.getElementById('docForm').innerHTML=`<div class="row"><div><label>Obra</label><select id="d_obra">${obraOptions(d.obra)}</select></div><div><label>Categoria / carpeta</label><select id="d_cat"><option>01_Actas_Ejecucion</option><option>02_Seguridad_y_Salud</option><option>03_Control_Calidad</option><option>04_Ordenes_de_Obra</option><option>05_No_Conformidades</option><option>06_Fotografias</option><option>07_Fichas_Tecnicas</option><option>08_Certificados</option><option>09_Ensayos_Laboratorio</option><option>10_Facturas_Cobros</option><option>11_Final_Obra</option></select></div><div><label>Fecha</label><input type="date" id="d_fecha" value="${esc(d.fecha||today())}"></div><div><label>Tipo</label><select id="d_tipo"><option>Acta</option><option>Ficha tecnica</option><option>Certificado</option><option>Ensayo</option><option>Albaran</option><option>Factura</option><option>Plano</option><option>Fotografia</option><option>Documento SyS</option><option>Otro</option></select></div></div><label>Titulo / descripcion</label><input id="d_titulo" value="${esc(d.titulo||'')}"><div class="filebox"><label>Escanear/fotografiar documento o adjuntar archivo</label><input id="d_file" type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx" capture="environment"><p class="muted">El navegador no puede imponer una carpeta fisica. La app genera ruta y nombre para que lo guardes en Archivos/Drive/OneDrive. Para muchos documentos, usa la ruta sugerida.</p></div><label>Nombre de archivo</label><input id="d_archivo" value="${esc(d.archivo||'')}"><label>Ruta/carpeta sugerida</label><input id="d_ruta" value="${esc(d.ruta||'')}"><label>Notas</label><textarea id="d_notas">${esc(d.notas||'')}</textarea><div class="actions"><button class="btn" id="saveDoc">Guardar documento</button><button class="btn secondary" id="calcDoc">Generar nombre/ruta</button></div>`;setVal('d_cat',d.categoria||'07_Fichas_Tecnicas');setVal('d_tipo',d.tipo||'Ficha tecnica');document.getElementById('d_file').onchange=()=>{let f=document.getElementById('d_file').files[0]; if(f){setVal('d_archivo',f.name); if(!v('d_titulo'))setVal('d_titulo',f.name)}};document.getElementById('calcDoc').onclick=calcDocPath;document.getElementById('saveDoc').onclick=()=>{if(!v('d_ruta'))calcDocPath();let obj={id:d.id||id(),obra:v('d_obra'),categoria:v('d_cat'),fecha:v('d_fecha'),tipo:v('d_tipo'),titulo:v('d_titulo'),archivo:v('d_archivo'),ruta:v('d_ruta'),origen:'Escaneo/archivo registrado',notas:v('d_notas')};upsert(S.documentos,obj);save('documentos');render()}}
function calcDocPath(){let obra=v('d_obra'),cat=v('d_cat'),fecha=v('d_fecha')||today(),tipo=v('d_tipo'),titulo=v('d_titulo')||tipo,ext='pdf';let f=document.getElementById('d_file')?.files?.[0]; if(f&&f.name.includes('.'))ext=f.name.split('.').pop().toLowerCase();let filename=`${safeName(fecha)}_${safeName(obra)}_${safeName(tipo)}_${safeName(titulo)}.${ext}`;let base=cat==='10_Facturas_Cobros'?'07_Cobros_Facturas':(cat==='11_Final_Obra'?'08_Final_Obra':'06_Obra/'+cat);setVal('d_archivo',v('d_archivo')||filename);setVal('d_ruta',`${safeName(obra)}/${base}/${v('d_archivo')||filename}`)}
function tableDocs(){return `<div class="card scroll"><h2>Archivo documental</h2><table><tr><th>Fecha</th><th>Obra</th><th>Carpeta</th><th>Documento</th><th>Ruta</th><th></th></tr>${S.documentos.slice().reverse().map(d=>`<tr><td>${esc(d.fecha)}</td><td>${esc(d.obra)}</td><td>${esc(d.categoria)}</td><td><b>${esc(d.titulo)}</b><br><span class="muted">${esc(d.tipo)} · ${esc(d.archivo||'')}</span></td><td><div class="path">${esc(d.ruta||'')}</div></td><td><button class="btn light" onclick="editDoc('${d.id}')">Editar</button></td></tr>`).join('')}</table>${!S.documentos.length?'<p class="muted">No hay documentos registrados.</p>':''}</div>`}
function editDoc(id){tab='Documentacion';render();formDoc(S.documentos.find(x=>x.id===id))}
function cobros(a){a.innerHTML=`<div class="card"><h2>Gestion de cobros</h2><div class="row"><div><label>Obra</label><select id="co_obra">${obraOptions()}</select></div><div><label>Cliente</label><select id="co_cliente">${clientOptions()}</select></div><div><label>Concepto</label><input id="co_concepto"></div><div><label>Importe base</label><input type="number" id="co_importe"></div><div><label>IVA %</label><input type="number" id="co_iva" value="21"></div><div><label>IRPF %</label><input type="number" id="co_irpf" value="0"></div><div><label>Estado</label><select id="co_estado"><option>Pendiente de facturar</option><option>Facturado pendiente de cobro</option><option>Cobrado</option><option>No facturable</option></select></div><div><label>Fecha</label><input type="date" id="co_fecha" value="${today()}"></div></div><button class="btn" id="addCobro">Guardar</button></div>${tableCobros()}${resumenFiscal()}`;document.getElementById('addCobro').onclick=()=>{S.cobros.push({id:id(),obra:v('co_obra'),cliente:v('co_cliente'),concepto:v('co_concepto'),importe:v('co_importe'),iva:v('co_iva'),irpf:v('co_irpf'),estado:v('co_estado'),fecha:v('co_fecha')});save('cobros');render()}}

function facturasGastos(a){a.innerHTML=`<div class="card"><div class="section-title"><h2>Facturas y gastos escaneados</h2><button class="btn" id="newFG">Nuevo registro</button></div><p class="muted">Archivo economico para facturas emitidas, facturas recibidas, tickets, suplidos, gastos deducibles y documentos escaneados. Sirve para resumen trimestral y anual de IVA/IRPF.</p><div class="note"><b>Carpetas sugeridas:</b><div class="path">OBRA/09_Economia/01_Facturas_Emitidas · 02_Facturas_Recibidas · 03_Gastos · 04_Suplidos · 05_Impuestos · 06_Resumen_Trimestral · 07_Resumen_Anual</div></div><div id="fgForm"></div></div>${tableFG()}${resumenFiscalAvanzado()}`;document.getElementById('newFG').onclick=()=>formFG()}
function formFG(f={}){document.getElementById('fgForm').innerHTML=`<div class="row"><div><label>Clase</label><select id="fg_clase"><option>Ingreso</option><option>Gasto</option><option>Suplido</option><option>Impuesto</option><option>No deducible / No computable</option></select></div><div><label>Tipo documento</label><select id="fg_tipo"><option>Factura emitida</option><option>Factura recibida</option><option>Ticket</option><option>Albaran</option><option>Recibo</option><option>Justificante bancario</option><option>Modelo tributario</option><option>Otro</option></select></div><div><label>Obra / expediente</label><select id="fg_obra">${obraOptions(f.obra)}</select></div><div><label>Cliente / proveedor</label><input id="fg_tercero" value="${esc(f.tercero||'')}"></div><div><label>NIF/CIF</label><input id="fg_nif" value="${esc(f.nif||'')}"></div><div><label>Numero factura</label><input id="fg_numero" value="${esc(f.numero||'')}"></div><div><label>Fecha</label><input type="date" id="fg_fecha" value="${esc(f.fecha||today())}"></div><div><label>Trimestre</label><select id="fg_trim"><option>1T</option><option>2T</option><option>3T</option><option>4T</option></select></div><div><label>Base imponible</label><input type="number" id="fg_base" value="${esc(f.base||'')}"></div><div><label>IVA %</label><input type="number" id="fg_iva" value="${esc(f.ivaPct??21)}"></div><div><label>IRPF %</label><input type="number" id="fg_irpf" value="${esc(f.irpfPct??0)}"></div><div><label>Estado</label><select id="fg_estado"><option>Pendiente</option><option>Pagada / cobrada</option><option>Pendiente de pago/cobro</option><option>No deducible</option><option>Archivada</option></select></div><div><label>Categoria</label><select id="fg_categoria"><option>Honorarios profesionales</option><option>Gastos estudio</option><option>Material oficina</option><option>Equipos informaticos</option><option>Desplazamientos</option><option>Colegio profesional</option><option>Seguros</option><option>Telefonia/internet</option><option>Asesoria</option><option>Subcontratas/colaboradores</option><option>Tasas/licencias/suplidos</option><option>Obra - materiales</option><option>Otro</option></select></div></div><div class="filebox"><label>Escanear/fotografiar factura o adjuntar PDF</label><input id="fg_file" type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx" capture="environment"><p class="muted">Desde iPhone/iPad puedes usar la camara. La app registra el nombre/ruta; para guardar fisicamente usa Archivos, Drive o la carpeta que tengas configurada.</p></div><div class="row"><div><label>Nombre archivo</label><input id="fg_archivo" value="${esc(f.archivo||'')}"></div><div><label>Ruta/carpeta sugerida</label><input id="fg_ruta" value="${esc(f.ruta||'')}"></div></div><label>Notas</label><textarea id="fg_notas">${esc(f.notas||'')}</textarea><div class="actions"><button class="btn" id="saveFG">Guardar factura/gasto</button><button class="btn secondary" id="calcFG">Generar ruta</button></div>`;['fg_clase','fg_tipo','fg_trim','fg_estado','fg_categoria'].forEach(k=>setVal(k,f[k.replace('fg_','')]||''));document.getElementById('fg_file').onchange=()=>{let file=document.getElementById('fg_file').files[0];if(file){setVal('fg_archivo',file.name)}};document.getElementById('calcFG').onclick=calcFGPath;document.getElementById('saveFG').onclick=()=>{if(!v('fg_ruta'))calcFGPath();let base=Number(v('fg_base')||0), iva=base*Number(v('fg_iva')||0)/100, irpf=base*Number(v('fg_irpf')||0)/100;let obj={id:f.id||id(),clase:v('fg_clase'),tipo:v('fg_tipo'),obra:v('fg_obra'),tercero:v('fg_tercero'),nif:v('fg_nif'),numero:v('fg_numero'),fecha:v('fg_fecha'),trim:v('fg_trim'),base:base,ivaPct:v('fg_iva'),iva:iva,irpfPct:v('fg_irpf'),irpf:irpf,estado:v('fg_estado'),categoria:v('fg_categoria'),archivo:v('fg_archivo'),ruta:v('fg_ruta'),notas:v('fg_notas')};upsert(S.facturasGastos,obj);save('facturasGastos');if(obj.archivo||obj.ruta){upsert(S.documentos,{id:'doc_'+obj.id,obra:obj.obra,categoria:'10_Facturas_Cobros',fecha:obj.fecha,tipo:obj.tipo,titulo:(obj.clase+' - '+obj.tercero+' - '+obj.numero).trim(),archivo:obj.archivo,ruta:obj.ruta,origen:'Registro economico',notas:obj.notas});save('documentos')}render()}}
function calcFGPath(){let obra=v('fg_obra'),fecha=v('fg_fecha')||today(),clase=v('fg_clase'),tipo=v('fg_tipo'),num=v('fg_numero')||'sin_numero',ter=v('fg_tercero')||'tercero';let ext='pdf';let file=document.getElementById('fg_file')?.files?.[0];if(file&&file.name.includes('.'))ext=file.name.split('.').pop().toLowerCase();let carpeta=clase==='Ingreso'?'01_Facturas_Emitidas':(clase==='Gasto'?'02_Facturas_Recibidas':(clase==='Suplido'?'04_Suplidos':(clase==='Impuesto'?'05_Impuestos':'03_Gastos')));let filename=`${safeName(fecha)}_${safeName(tipo)}_${safeName(num)}_${safeName(ter)}.${ext}`;setVal('fg_archivo',v('fg_archivo')||filename);setVal('fg_ruta',`${safeName(obra)}/09_Economia/${carpeta}/${v('fg_archivo')||filename}`)}
function tableFG(){return `<div class="card scroll"><h2>Archivo de facturas y gastos</h2><table><tr><th>Fecha</th><th>Clase</th><th>Documento</th><th>Tercero</th><th>Base</th><th>IVA</th><th>IRPF</th><th>Ruta</th><th></th></tr>${S.facturasGastos.slice().reverse().map(f=>`<tr><td>${esc(f.fecha)}<br><span class="muted">${esc(f.trim||'')}</span></td><td>${badge(f.clase)}</td><td><b>${esc(f.tipo)}</b><br><span class="muted">${esc(f.numero||'')} · ${esc(f.categoria||'')}</span></td><td>${esc(f.tercero||'')}<br><span class="muted">${esc(f.nif||'')}</span></td><td>${Number(f.base||0).toLocaleString('es-ES')} €</td><td>${Number(f.iva||0).toLocaleString('es-ES')} €</td><td>${Number(f.irpf||0).toLocaleString('es-ES')} €</td><td><div class="path">${esc(f.ruta||'')}</div></td><td><button class="btn light" onclick="editFG('${f.id}')">Editar</button></td></tr>`).join('')}</table>${!S.facturasGastos.length?'<p class="muted">No hay facturas ni gastos registrados.</p>':''}</div>`}
function editFG(fid){tab='Facturas y gastos';render();formFG(S.facturasGastos.find(x=>x.id===fid))}
function resumenFiscalAvanzado(){let y=new Date().getFullYear();let rows=['1T','2T','3T','4T'].map(t=>calcPeriodo(y,t));let anual=calcPeriodo(y,'ANUAL');return `<div class="card"><h2>Resumen trimestral y anual orientativo ${y}</h2><div class="scroll"><table><tr><th>Periodo</th><th>Ingresos base</th><th>Gastos base</th><th>IVA repercutido</th><th>IVA soportado</th><th>IVA estimado</th><th>IRPF retenido</th><th>Resultado base</th></tr>${rows.map(r=>periodRow(r)).join('')}${periodRow(anual)}</table></div><p class="muted">Resumen interno para preparar IVA/IRPF. No sustituye la revision fiscal. Marca como no deducible lo que no proceda.</p></div>`}
function calcPeriodo(year,trim){let arr=S.facturasGastos.filter(f=>{let d=new Date(f.fecha||'');let okYear=!isNaN(d)&&d.getFullYear()===year;return trim==='ANUAL'?okYear:(okYear&&(f.trim===trim||quarterFromDate(f.fecha)===trim))});let ingresos=arr.filter(f=>f.clase==='Ingreso'), gastos=arr.filter(f=>f.clase==='Gasto'||f.clase==='Suplido');let ib=ingresos.reduce((s,f)=>s+Number(f.base||0),0), gb=gastos.reduce((s,f)=>s+Number(f.base||0),0), ivaR=ingresos.reduce((s,f)=>s+Number(f.iva||0),0), ivaS=gastos.reduce((s,f)=>s+Number(f.iva||0),0), irpf=ingresos.reduce((s,f)=>s+Number(f.irpf||0),0);return {periodo:trim,ib,gb,ivaR,ivaS,iva:ivaR-ivaS,irpf,res:ib-gb}}
function quarterFromDate(fecha){let m=(new Date(fecha).getMonth()+1);return m<=3?'1T':m<=6?'2T':m<=9?'3T':'4T'}
function periodRow(r){return `<tr><td><b>${r.periodo}</b></td><td>${r.ib.toLocaleString('es-ES')} €</td><td>${r.gb.toLocaleString('es-ES')} €</td><td>${r.ivaR.toLocaleString('es-ES')} €</td><td>${r.ivaS.toLocaleString('es-ES')} €</td><td>${r.iva.toLocaleString('es-ES')} €</td><td>${r.irpf.toLocaleString('es-ES')} €</td><td>${r.res.toLocaleString('es-ES')} €</td></tr>`}
function exp(a){a.innerHTML=`<div class="card"><h2>Exportar / copia de seguridad</h2><p>Antes de actualizar la app, exporta estos datos. La nueva version conserva las claves locales, pero esta copia evita perdidas.</p><button class="btn" id="down">Descargar JSON</button><label>Importar JSON</label><textarea id="imp"></textarea><button class="btn secondary" id="import">Importar</button><button class="btn danger" id="wipe">Borrar datos locales</button></div>`;document.getElementById('down').onclick=download;document.getElementById('import').onclick=importData;document.getElementById('wipe').onclick=()=>{if(confirm('Borrar todos los datos locales?')){keys.forEach(k=>localStorage.removeItem('dq_'+k));load();render()}}}
function tableClientes(){return `<div class="card scroll"><h2>Listado clientes</h2><table><tr><th>Nombre</th><th>Telefono</th><th>Email</th><th>Contacto</th><th></th></tr>${S.clientes.map(c=>`<tr><td>${esc(c.nombre)}<br><span class="muted">${esc(c.nif||'')}</span></td><td><a href="tel:${esc(c.telefono)}">${esc(c.telefono||'')}</a></td><td><a href="mailto:${esc(c.email)}">${esc(c.email||'')}</a></td><td>${esc(c.contacto||'')}</td><td><button class="btn light" onclick="editCliente('${c.id}')">Editar</button></td></tr>`).join('')}</table></div>`}
function tableAgentes(){return `<div class="card scroll"><h2>Listado agentes</h2><table><tr><th>Tipo</th><th>Nombre</th><th>Contacto</th><th>Email/tel.</th><th></th></tr>${S.agentes.map(g=>`<tr><td>${esc(g.tipo)}</td><td>${esc(g.nombre)}<br><span class="muted">${esc(g.nif||'')}</span></td><td>${esc(g.contacto||'')}</td><td><a href="tel:${esc(g.telefono)}">${esc(g.telefono||'')}</a><br><a href="mailto:${esc(g.email)}">${esc(g.email||'')}</a></td><td><button class="btn light" onclick="editAgente('${g.id}')">Editar</button></td></tr>`).join('')}</table></div>`}
function tableObras(){return `<div class="card scroll"><h2>Listado obras</h2><table><tr><th>Codigo</th><th>Nombre</th><th>Cliente</th><th>Agentes</th><th></th></tr>${S.obras.map(o=>{let ag=obraAgents(o);return `<tr><td>${esc(o.codigo)}</td><td>${esc(o.nombre)}<br><span class="muted">${esc(o.direccion||'')}</span></td><td>${esc(o.cliente||'')}</td><td><span class="chip">Constructor: ${esc(ag.constructor?.nombre||'')}</span><span class="chip">DO: ${esc(ag.do?.nombre||'')}</span><span class="chip">CSS: ${esc(ag.css?.nombre||'')}</span></td><td><button class="btn light" onclick="editObra('${o.id}')">Editar</button></td></tr>`}).join('')}</table></div>`}
function badge(x){let cls=(x||'').includes('Correcto')||(x||'').includes('Cobrado')||(x||'').includes('Enviada')?'ok':((x||'').includes('No')||(x||'').includes('grave')||(x||'').includes('Requerimiento')?'bad':'warn');return `<span class="badge ${cls}">${esc(x)}</span>`}
function tableEjec(){return `<div class="card scroll"><h2>Registros ejecucion</h2><table><tr><th>Fecha</th><th>Obra</th><th>Unidad</th><th>Estado</th><th>Obs.</th></tr>${S.ejecucion.map(x=>`<tr><td>${esc(x.fecha)}</td><td>${esc(x.obra)}</td><td>${esc(x.unidad)}</td><td>${badge(x.estado)}</td><td>${esc(x.obs)}</td></tr>`).join('')}</table></div>`}
function tableSys(){return `<div class="card scroll"><h2>Registros SyS</h2><table><tr><th>Fecha</th><th>Obra</th><th>Resultado</th><th>Obs.</th></tr>${S.sys.map(x=>`<tr><td>${esc(x.fecha)}</td><td>${esc(x.obra)}</td><td>${badge(x.estado)}</td><td>${esc(x.obs)}</td></tr>`).join('')}</table></div>`}
function tableActas(compact){return `<div class="card scroll"><h2>Actas</h2><table><tr><th>Fecha</th><th>Tipo</th><th>Obra</th><th>Estado</th><th class="no-print">Acciones</th></tr>${S.actas.slice().reverse().map(x=>`<tr><td>${esc(x.fecha)}</td><td>${esc(x.tipo)}</td><td>${esc(x.obra)}</td><td>${badge(x.estado||'Borrador')}</td><td class="no-print"><button class="btn light" onclick="openActa('${x.id}')">Abrir/enviar/archivar</button></td></tr>`).join('')}</table>${!S.actas.length?'<p class="muted">No hay actas todavia.</p>':''}</div>`}
function tableCobros(){return `<div class="card scroll"><h2>Cobros / facturacion</h2><table><tr><th>Fecha</th><th>Cliente</th><th>Concepto</th><th>Base</th><th>IVA</th><th>IRPF</th><th>Estado</th></tr>${S.cobros.map(x=>{let base=Number(x.importe||0), iva=base*Number(x.iva||0)/100, irpf=base*Number(x.irpf||0)/100;return `<tr><td>${esc(x.fecha)}</td><td>${esc(x.cliente)}</td><td>${esc(x.concepto)}</td><td>${base.toLocaleString('es-ES')} €</td><td>${iva.toLocaleString('es-ES')} €</td><td>${irpf.toLocaleString('es-ES')} €</td><td>${badge(x.estado)}</td></tr>`}).join('')}</table></div>`}
function resumenFiscal(){let fact=S.cobros.filter(x=>x.estado.includes('Facturado')||x.estado==='Cobrado');let base=fact.reduce((s,x)=>s+Number(x.importe||0),0);let iva=fact.reduce((s,x)=>s+Number(x.importe||0)*Number(x.iva||0)/100,0);let irpf=fact.reduce((s,x)=>s+Number(x.importe||0)*Number(x.irpf||0)/100,0);let pend=S.cobros.filter(x=>x.estado!=='Cobrado'&&x.estado!=='No facturable').reduce((s,x)=>s+Number(x.importe||0),0);return `<div class="card"><h2>Resumen fiscal orientativo</h2><div class="grid"><div><div class="muted">Base facturada/cobrada</div><div class="metric">${base.toLocaleString('es-ES')} €</div></div><div><div class="muted">IVA repercutido</div><div class="metric">${iva.toLocaleString('es-ES')} €</div></div><div><div class="muted">IRPF retenido</div><div class="metric">${irpf.toLocaleString('es-ES')} €</div></div><div><div class="muted">Pendiente facturar/cobrar</div><div class="metric">${pend.toLocaleString('es-ES')} €</div></div></div><p class="muted">Control interno orientativo. Revisar con asesoria antes de declarar.</p></div>`}
function checks(el,arr){document.getElementById(el).innerHTML=arr.map(x=>`<label class="check"><input type="checkbox" data-check="${esc(x)}" checked> ${esc(x)}</label>`).join('')}
function getChecks(el){return [...document.querySelectorAll('#'+el+' input')].filter(i=>i.checked).map(i=>i.dataset.check)}
function clientOptions(sel=''){return S.clientes.map(c=>`<option ${c.nombre===sel?'selected':''}>${esc(c.nombre)}</option>`).join('')}
function obraOptions(sel=''){return S.obras.map(o=>`<option value="${esc(o.codigo)}" ${o.codigo===sel?'selected':''}>${esc(o.codigo)} - ${esc(o.nombre)}</option>`).join('')}
function agentOptions(sel=''){return `<option value="">-- Sin asignar --</option>`+S.agentes.map(g=>`<option value="${esc(g.id)}" ${g.id===sel||g.nombre===sel?'selected':''}>${esc(g.tipo)} - ${esc(g.nombre)}</option>`).join('')}
function agentById(x){return S.agentes.find(g=>g.id===x||g.nombre===x)||null}
function obraAgents(o){let a=o.agentes||{};return {promotor:agentById(a.promotor),constructor:agentById(a.constructor)||S.agentes.find(g=>g.nombre===o.constructor),recurso:agentById(a.recurso),autor:agentById(a.autor),do:agentById(a.do)||S.agentes.find(g=>g.nombre===o.tecnico),dem:agentById(a.dem),css:agentById(a.css),lab:agentById(a.lab)}}
function upsert(arr,obj){let i=arr.findIndex(x=>x.id===obj.id); if(i>=0)arr[i]=obj; else arr.push(obj)}
function editCliente(id){formCliente(S.clientes.find(x=>x.id===id))} function editAgente(id){formAgente(S.agentes.find(x=>x.id===id))} function editObra(id){formObra(S.obras.find(x=>x.id===id))}
function openActa(id){let x=S.actas.find(a=>a.id===id);tab='Actas y documentos';render();formActa(x);previewActa(x)}
function cleanPhone(p){return String(p||'').replace(/[^0-9]/g,'').replace(/^00/,'')}
function download(){let data=JSON.stringify(S,null,2);let blob=new Blob([data],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='dq-studio-datos.json';a.click();URL.revokeObjectURL(url)}
function importData(){try{let d=JSON.parse(v('imp'));keys.forEach(k=>{if(Array.isArray(d[k])){S[k]=d[k];save(k)}});migrate();saveAll();render()}catch(e){alert('JSON no valido')}}
load();render();
</script>
</body>
</html>
